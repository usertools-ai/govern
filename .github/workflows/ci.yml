name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npx biome check .
      - name: Typecheck
        run: npx tsc -b
      - name: Test
        run: npx vitest run
      - name: Coverage
        run: npx vitest run --coverage --coverage.thresholds.lines=88 --coverage.thresholds.branches=82 --coverage.thresholds.functions=85 --coverage.thresholds.statements=88
